name: Sync Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: python -m pip install --upgrade pip -r scripts/requirements.txt

      - name: Generate sync watch report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/sync_watch.py \
            --upstreams targets/ax6600/upstreams.yml \
            --compat targets/ax6600/compat-matrix.yml \
            --output reports/sync-watch.md \
            --json-output reports/sync-watch.json
          python scripts/refresh_compat_matrix.py \
            --upstreams targets/ax6600/upstreams.yml \
            --compat targets/ax6600/compat-matrix.yml \
            --output targets/ax6600/compat-matrix.yml

      - name: Create review PR
        id: create_review_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/sync-watch"
          title: "chore: refresh upstream sync watch report"
          body: |
            This PR refreshes the tracked upstream state report.

            Review any reported updates, then follow with `config-diff` and `canary-build`.
          commit-message: |
            Refresh upstream sync watch report

            Constraint: Upstream changes must be reviewed before promotion
            Confidence: medium
            Scope-risk: narrow
            Directive: Do not release directly from watch reports without canary validation
            Tested: Sync watch report generation
            Not-tested: Source rebase and firmware build

      - name: Summarize sync watch review lane
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = "${{ steps.create_review_pr.outputs.pull-request-number }}"
          pr_url = "${{ steps.create_review_pr.outputs.pull-request-url }}"
          branch_url = f"https://github.com/{repo}/tree/bot/sync-watch"

          lines = [
              "## Sync Watch Review Lane",
              "",
          ]
          if pr_number and pr_url:
              lines.extend(
                  [
                      f"- Pull request created or updated: #{pr_number}",
                      f"- Review URL: {pr_url}",
                  ]
              )
          else:
              lines.extend(
                  [
                      "- Pull request was not created by the workflow.",
                      f"- Review branch was still pushed: {branch_url}",
                      "- If you want automatic PR creation, enable the repository setting that allows GitHub Actions to create pull requests.",
                  ]
              )

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-watch-report
          path: |
            reports/sync-watch.md
            reports/sync-watch.json
            targets/ax6600/compat-matrix.yml
