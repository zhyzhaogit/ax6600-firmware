name: Publish Build Release

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Successful Build AX6600 Firmware run id"
        required: true
      artifact_name:
        description: "Artifact name from the build run. Leave empty to auto-detect ax6600-firmware-<run_number>."
        required: false
        default: ""
      release_tag:
        description: "Release tag to create or update"
        required: true
      release_name:
        description: "Release title. Leave empty to reuse the tag."
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate build run and resolve artifact name
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          ARTIFACT_NAME_INPUT: ${{ inputs.artifact_name }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = os.environ["REPO"]
          build_run_id = os.environ["BUILD_RUN_ID"]
          artifact_name_input = os.environ["ARTIFACT_NAME_INPUT"].strip()

          run = json.loads(
              subprocess.check_output(
                  [
                      "gh",
                      "api",
                      f"repos/{repo}/actions/runs/{build_run_id}",
                  ],
                  text=True,
              )
          )

          if run["status"] != "completed" or run["conclusion"] != "success":
              raise SystemExit(
                  f"Build run {build_run_id} is not a successful completed run: "
                  f"status={run['status']} conclusion={run['conclusion']}"
              )

          artifact_name = artifact_name_input or f"ax6600-firmware-{run['run_number']}"
          release_name = os.environ["RELEASE_NAME_INPUT"].strip() or os.environ["RELEASE_TAG"]
          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as handle:
              handle.write(f"BUILD_RUN_NUMBER={run['run_number']}\n")
              handle.write(f"BUILD_HEAD_SHA={run['head_sha']}\n")
              handle.write(f"BUILD_ARTIFACT_NAME={artifact_name}\n")
              handle.write(f"RESOLVED_RELEASE_NAME={release_name}\n")

          print(
              f"Using build run {build_run_id} "
              f"(run_number={run['run_number']}, artifact={artifact_name})"
          )
          PY

      - name: Download build artifact bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-input
          gh run download "${{ inputs.build_run_id }}" \
            --repo "${{ github.repository }}" \
            --name "${BUILD_ARTIFACT_NAME}" \
            --dir release-input

      - name: Validate downloaded release payload
        run: |
          test -f release-input/dist/release/release-metadata.md
          test -f release-input/dist/release/release-metadata.json
          test -f release-input/build/ax6600/final.config

          factory_count=$(find release-input/dist/firmware/factory -type f | wc -l)
          sysupgrade_count=$(find release-input/dist/firmware/sysupgrade -type f | wc -l)
          if [ "${factory_count}" -eq 0 ] || [ "${sysupgrade_count}" -eq 0 ]; then
            echo "Expected both factory and sysupgrade firmware artifacts." >&2
            exit 1
          fi

      - name: Render publish summary
        run: |
          {
            echo "## Publish Build Release"
            echo ""
            echo "- Build run id: \`${{ inputs.build_run_id }}\`"
            echo "- Build run number: \`${BUILD_RUN_NUMBER}\`"
            echo "- Artifact: \`${BUILD_ARTIFACT_NAME}\`"
            echo "- Release tag: \`${{ inputs.release_tag }}\`"
            echo "- Build commit: \`${BUILD_HEAD_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ env.RESOLVED_RELEASE_NAME }}
          body_path: release-input/dist/release/release-metadata.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-input/dist/firmware/factory/**
            release-input/dist/firmware/sysupgrade/**
            release-input/dist/firmware/meta/**
            release-input/dist/release/release-metadata.json
            release-input/dist/release/release-metadata.md
            release-input/build/ax6600/final.config
            release-input/reports/required-features-build.md
