name: Build AX6600 Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_key:
        description: "Key from targets/ax6600/upstreams.yml"
        required: false
        default: "source-upstream"
      optional_profiles:
        description: "Extra optional profiles to add"
        required: false
        default: ""
      replace_default_optional_profiles:
        description: "Ignore manifest default optional profiles"
        required: false
        type: boolean
        default: false
      package_overrides:
        description: "Whitespace/comma/newline separated package overrides. Use -pkg to disable."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true

      - name: Build environment setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: python -m pip install --upgrade pip -r scripts/requirements.txt

      - name: Assemble config
        run: |
          EXTRA_ARGS=""
          if [ "${{ inputs.replace_default_optional_profiles }}" = "true" ]; then
            EXTRA_ARGS="--replace-default-optional-profiles"
          fi
          python scripts/assemble_config.py \
            --manifest targets/ax6600/manifest.yml \
            --optional-profiles "${{ inputs.optional_profiles }}" \
            --output build/ax6600/.config \
            ${EXTRA_ARGS}

      - name: Apply package overrides
        run: |
          python scripts/apply_package_overrides.py \
            --config build/ax6600/.config \
            --overrides "${{ inputs.package_overrides }}"

      - name: Resolve source repository
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          manifest = yaml.safe_load(Path("targets/ax6600/manifest.yml").read_text(encoding="utf-8"))
          upstreams = yaml.safe_load(Path("targets/ax6600/upstreams.yml").read_text(encoding="utf-8"))
          requested = "${{ inputs.source_key }}" or manifest["source_selection"]["bootstrap_upstream"]
          entry = upstreams["repositories"].get(requested) or upstreams["repositories"][manifest["source_selection"]["bootstrap_upstream"]]
          if requested == "source-primary" and not entry.get("enabled", False):
              entry = upstreams["repositories"][manifest["source_selection"]["bootstrap_upstream"]]
              requested = manifest["source_selection"]["bootstrap_upstream"]
          with Path("source.env").open("w", encoding="utf-8") as handle:
              handle.write(f"SOURCE_KEY={requested}\n")
              handle.write(f"SOURCE_REPO={entry['repo']}\n")
              handle.write(f"SOURCE_BRANCH={entry['branch']}\n")
          PY
          cat source.env >> "$GITHUB_ENV"

      - name: Clone and prepare source tree
        run: |
          git clone --depth 1 --branch "${SOURCE_BRANCH}" "https://github.com/${SOURCE_REPO}.git" work/source
          bash scripts/prepare_source_tree.sh work/source feeds/custom.conf patches/firmware-layer
          cp build/ax6600/.config work/source/.config

      - name: Update feeds and defconfig
        run: |
          pushd work/source
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          popd
          cp work/source/.config build/ax6600/final.config

      - name: Render defconfig focus report
        run: |
          python - <<'PY'
          from pathlib import Path

          config_path = Path("build/ax6600/final.config")
          lines = config_path.read_text(encoding="utf-8").splitlines()
          wanted = (
              "CONFIG_TARGET_qualcommax",
              "CONFIG_TARGET_qualcommax_ipq60xx",
              "CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02",
              "CONFIG_TARGET_PROFILE",
              "CONFIG_TARGET_ROOTFS_INITRAMFS",
              "CONFIG_ATH11K_NSS_SUPPORT",
              "CONFIG_PACKAGE_MAC80211_NSS_SUPPORT",
              "CONFIG_NSS_FIRMWARE_VERSION_11_4",
              "CONFIG_PACKAGE_libiconv-full",
              "CONFIG_PACKAGE_libintl-full",
              "CONFIG_PACKAGE_irqbalance",
              "CONFIG_PACKAGE_luci-app-irqbalance",
              "CONFIG_PACKAGE_ethtool",
              "CONFIG_PACKAGE_ethtool-full",
          )
          selected = []
          for line in lines:
              if line.startswith(wanted) or any(line.startswith(f"# {item} is not set") for item in wanted):
                  selected.append(line)
          report = "\n".join(
              [
                  "# Defconfig Focus Report",
                  "",
                  "```config",
                  *selected,
                  "```",
                  "",
              ]
          )
          report_path = Path("reports/defconfig-focus-build.md")
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(report, encoding="utf-8")
          print(report)
          PY

      - name: Validate required features
        run: |
          python scripts/check_required_features.py \
            --policy targets/ax6600/feature-policy.yml \
            --config build/ax6600/final.config \
            --output reports/required-features-build.md

      - name: Upload defconfig debug snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ax6600-defconfig-${{ github.run_number }}
          path: |
            build/ax6600/.config
            build/ax6600/final.config
            reports/defconfig-focus-build.md
            reports/required-features-build.md
          if-no-files-found: warn

      - name: Download sources
        run: |
          pushd work/source
          make download -j8
          popd

      - name: Build firmware
        run: |
          pushd work/source
          make -j"$(nproc)" || make -j1 V=s
          popd

      - name: Collect firmware artifacts
        run: |
          bash scripts/collect_firmware_artifacts.sh work/source dist/firmware
          SOURCE_COMMIT="$(git -C work/source rev-parse HEAD)"
          EXTRA_ARGS=""
          if [ "${{ inputs.replace_default_optional_profiles }}" = "true" ]; then
            EXTRA_ARGS="--replace-default-optional-profiles"
          fi
          python scripts/render_release_metadata.py \
            --manifest targets/ax6600/manifest.yml \
            --compat targets/ax6600/compat-matrix.yml \
            --policy targets/ax6600/feature-policy.yml \
            --source-repo "${SOURCE_REPO}" \
            --source-branch "${SOURCE_BRANCH}" \
            --source-commit "${SOURCE_COMMIT}" \
            --optional-profiles "${{ inputs.optional_profiles }}" \
            --patch-set-version firmware-layer-v1 \
            ${EXTRA_ARGS} \
            --output-json dist/release/release-metadata.json \
            --output-md dist/release/release-metadata.md

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ax6600-firmware-${{ github.run_number }}
          path: |
            dist/firmware/factory/**
            dist/firmware/sysupgrade/**
            dist/firmware/meta/**
            dist/release/release-metadata.json
            dist/release/release-metadata.md
            build/ax6600/final.config
            reports/required-features-build.md
