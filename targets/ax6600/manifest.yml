version: 1
target: ax6600

device:
  marketing_name: "JDCloud RE-CS-02 / AX6600"
  model_aliases:
    - "RE-CS-02"
    - "AX6600"
    - "jdcloud_re-cs-02"
  openwrt_target: "qualcommax/ipq60xx"
  config_profile: "IPQ60XX-WIFI-YES"
  target_device: "jdcloud_re-cs-02"

release:
  channel: "stable"
  name_prefix: "ax6600"
  timezone: "Asia/Shanghai"
  default_optional_profiles:
    - "access-localization"
    - "services"
    - "memory-boost"
    - "proxy-stack"
    - "connectivity"
    - "storage-nas"
    - "usb-network"
    - "docker"

network_defaults:
  lan_ip: "10.0.0.1"
  ssid: "AX6600"
  wifi_password_hint: "set-after-flash"
  theme: "argon"
  luci_lang: "zh_cn"

source_selection:
  preferred_upstream: "source-primary"
  bootstrap_upstream: "source-primary"
  fallback_upstream: "fallback-upstream"
  preferred_branch: "ax6600-stable"

config_fragments:
  base:
    - "config/ax6600/00-target.config"
    - "config/ax6600/10-nss.config"
    - "config/ax6600/20-network-tuning.config"
    - "config/ax6600/30-core-packages.config"
  optional_profiles:
    access-localization: "config/ax6600/40-optional-profiles/access-localization.config"
    services: "config/ax6600/40-optional-profiles/services.config"
    memory-boost: "config/ax6600/40-optional-profiles/memory-boost.config"
    proxy-stack: "config/ax6600/40-optional-profiles/proxy-stack.config"
    connectivity: "config/ax6600/40-optional-profiles/connectivity.config"
    storage-nas: "config/ax6600/40-optional-profiles/storage-nas.config"
    usb-network: "config/ax6600/40-optional-profiles/usb-network.config"
    docker: "config/ax6600/40-optional-profiles/docker.config"

feeds_files:
  - "feeds/custom.conf"

patch_sets:
  firmware_layer: "patches/firmware-layer"

artifacts:
  assembled_config: "build/ax6600/.config"
  report_dir: "reports"
  release_dir: "dist/release"
